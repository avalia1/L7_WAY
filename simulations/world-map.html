// ============================================================
// MAP INITIALIZATION
// ============================================================
const map = L.map('map', {
  center: [30, 20],
  zoom: 3,
  minZoom: 2,
  maxZoom: 19,
  zoomControl: true,
  attributionControl: true,
});

// Tile layers
const osmStandard = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
});

const osmTopo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  maxZoom: 17,
  attribution: '&copy; OpenTopoMap'
});

const cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  attribution: '&copy; CARTO'
});

const cartoDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  attribution: '&copy; CARTO'
});

// Default: dark base map
cartoDark.addTo(map);

const baseMaps = {
  "Dark": cartoDark,
  "Light": cartoLight,
  "Street": osmStandard,
  "Terrain": osmTopo,
};

// ============================================================
// CREATE CULTURE LAYER GROUPS
// ============================================================
const cultureLayers = {};
for (const key in CULTURES) {
  cultureLayers[key] = L.layerGroup();
}

// ============================================================
// POPULATE MARKERS
// ============================================================
const allMarkers = [];

CITIES.forEach(([lat, lng, ancient, modern, culture, era, note]) => {
  const c = CULTURES[culture];
  if (!c) return;

  const col = c.color;

  // Circle marker (visible at all zoom levels)
  const marker = L.circleMarker([lat, lng], {
    radius: 5,
    fillColor: col,
    color: col,
    weight: 1,
    opacity: 0.9,
    fillOpacity: 0.7,
  });

  // Tooltip label (ancient name)
  marker.bindTooltip(ancient, {
    permanent: true,
    direction: 'right',
    offset: [8, 0],
    className: 'ancient-label',
  });

  // Style the tooltip after it's added
  marker.on('tooltipopen', function(e) {
    const el = e.tooltip.getElement();
    if (el) {
      el.querySelector('.leaflet-tooltip-text, span')?.remove;
      el.innerHTML = `<span class="label-text" style="color:${col};">${ancient}</span>`;
    }
  });

  // Popup with full info
  marker.bindPopup(`
    <div class="ancient-name" style="color:${col};">${ancient}</div>
    <div class="modern-name">${modern}</div>
    <div class="heritage-tag" style="background:${col}22;color:${col};border:1px solid ${col}44;">${c.name}</div>
    <div class="era">${era}</div>
    <div class="lang">Language: ${c.lang}</div>
    <div class="note">${note}</div>
  `, { maxWidth: 280 });

  marker.addTo(cultureLayers[culture]);
  allMarkers.push({ marker, lat, lng, ancient, modern, culture, era, note });
});

// Add all culture layers to map by default
for (const key in cultureLayers) {
  cultureLayers[key].addTo(map);
}

// ============================================================
// LAYER CONTROL
// ============================================================
const overlayMaps = {};
for (const key in CULTURES) {
  const c = CULTURES[key];
  const count = CITIES.filter(city => city[4] === key).length;
  overlayMaps[`<span style="color:${c.color};">&#9679;</span> ${c.name} (${count})`] = cultureLayers[key];
}

L.control.layers(baseMaps, overlayMaps, {
  collapsed: true,
  position: 'topright',
}).addTo(map);

// ============================================================
// CITY COUNT
// ============================================================
document.getElementById('city-count').textContent = `${CITIES.length} ancient cities mapped`;

// Zoom level display
map.on('zoomend', () => {
  document.getElementById('zoom-level').textContent = `Zoom: ${map.getZoom()} / 19`;
});
document.getElementById('zoom-level').textContent = `Zoom: ${map.getZoom()} / 19`;

// ============================================================
// DYNAMIC LABEL VISIBILITY
// ============================================================
function updateLabelVisibility() {
  const zoom = map.getZoom();
  const bounds = map.getBounds();

  allMarkers.forEach(({ marker }) => {
    const tooltip = marker.getTooltip();
    if (!tooltip) return;

    const latlng = marker.getLatLng();
    const inView = bounds.contains(latlng);

    if (zoom >= 5) {
      // Show all labels in view
      if (!marker.isTooltipOpen() && inView) marker.openTooltip();
    } else if (zoom >= 3) {
      // Show labels but smaller
      if (!marker.isTooltipOpen() && inView) marker.openTooltip();
    }
    // At zoom < 3 labels still show but overlap — Leaflet handles this
  });

  // Adjust marker size based on zoom
  const radius = zoom >= 10 ? 8 : zoom >= 6 ? 6 : zoom >= 4 ? 5 : 4;
  allMarkers.forEach(({ marker }) => {
    marker.setRadius(radius);
  });
}

map.on('zoomend moveend', updateLabelVisibility);

// ============================================================
// SEARCH
// ============================================================
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  searchResults.innerHTML = '';

  if (q.length < 2) {
    searchResults.style.display = 'none';
    return;
  }

  const matches = allMarkers.filter(m =>
    m.ancient.toLowerCase().includes(q) ||
    m.modern.toLowerCase().includes(q) ||
    (CULTURES[m.culture]?.name || '').toLowerCase().includes(q) ||
    (CULTURES[m.culture]?.lang || '').toLowerCase().includes(q)
  ).slice(0, 12);

  if (matches.length === 0) {
    searchResults.style.display = 'none';
    return;
  }

  matches.forEach(m => {
    const div = document.createElement('div');
    div.className = 'search-item';
    const col = CULTURES[m.culture]?.color || '#ccc';
    div.innerHTML = `<span class="si-ancient" style="color:${col};">${m.ancient}</span><br><span class="si-modern">${m.modern}</span>`;
    div.onclick = () => {
      map.setView([m.lat, m.lng], 12);
      m.marker.openPopup();
      searchResults.style.display = 'none';
      searchInput.value = '';
    };
    searchResults.appendChild(div);
  });

  searchResults.style.display = 'block';
});

searchInput.addEventListener('blur', () => {
  setTimeout(() => { searchResults.style.display = 'none'; }, 200);
});

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') {
    searchInput.blur();
    searchResults.style.display = 'none';
  }
});
</script>
